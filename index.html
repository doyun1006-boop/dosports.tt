<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DO SPORTS 시간표</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#f0f2f8;padding:10px}
.w{max-width:720px;margin:0 auto}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;background:#1a1d27;border-radius:10px;padding:13px 16px;border:0.5px solid #3a3f55}
.logo{font-size:16px;font-weight:700;color:#fff}.logo em{color:#e8a020;font-style:normal}
.ticker-wrap{display:flex;align-items:center;background:#1a1d27;border:0.5px solid #3a3f55;border-radius:8px;padding:10px 12px;margin-bottom:10px;gap:10px;overflow:hidden}
.ticker-label{font-size:13px;font-weight:700;color:#e8a020;flex-shrink:0;white-space:nowrap}
.ticker-vp{flex:1;overflow:hidden}
.ticker-track{white-space:nowrap;display:inline-block;font-size:13px;font-weight:600;color:#e8a020;animation:marquee 18s linear infinite}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-edit{background:#2a1f00;border:0.5px solid #e8a020;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;color:#e8a020;cursor:pointer;white-space:nowrap;flex-shrink:0;display:none}
.ticker-edit.on{display:block}
.stabs{display:flex;gap:6px;margin-bottom:10px}
.stab{flex:1;padding:11px 4px;border:1.5px solid #3a3f55;border-radius:8px;background:#1e2130;font-size:13px;cursor:pointer;color:#fff;transition:.15s;text-align:center;font-weight:600}
.stab:hover{border-color:#6a7090;background:#252838}
.stab.on{background:#e8a020;color:#1a1100;border-color:#e8a020;font-weight:700}
.sec-hd{font-size:12px;font-weight:700;color:#d0d4e8;padding:5px 0;margin:14px 0 6px;border-bottom:0.5px solid #2e3147;display:flex;align-items:center;justify-content:space-between;letter-spacing:.4px;text-transform:uppercase}
.wknd-cnt{background:#e8a020;color:#1a1100;font-size:11px;padding:2px 9px;border-radius:10px;font-weight:700}
.ow{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;border:0.5px solid #2e3147}
table{border-collapse:collapse;width:100%;min-width:330px}
th,td{border:0.5px solid #2a2d3e}
th{background:#1e2130;font-weight:700;color:#d0d4e8;padding:8px 3px;font-size:12px;text-align:center;white-space:nowrap}
td.tc{background:#1a1d27;color:#c0c4d8;font-size:11px;padding:4px 6px;white-space:nowrap;min-width:60px;text-align:center;line-height:1.5;vertical-align:middle;font-weight:600;position:relative;transition:.15s}
td.tc.te{cursor:pointer;color:#e8a020}
td.tc.te:hover{background:#252838!important}
.te-ic{font-size:8px;color:#e8a020;position:absolute;top:2px;right:2px;opacity:.7}
td.tc.dr-row{cursor:grab;user-select:none;-webkit-user-select:none}
td.tc.dr-row::before{content:'⠿';font-size:10px;color:#3a3f55;margin-right:3px}
td.tc.row-src{background:#2a1f00!important;color:#e8a020!important;border-color:#50380a!important}
td.tc.row-over{background:rgba(232,160,32,.22)!important;border-color:#e8a020!important}
td.cell{vertical-align:top;padding:3px;background:#141720;min-width:64px;transition:.15s}
td.cell.drop-ok{background:rgba(232,160,32,.12)!important;outline:1.5px dashed #e8a020;outline-offset:-2px}
.cell-inner{display:flex;flex-direction:column;gap:2px;min-height:68px}
.mc-card{border-radius:4px;padding:3px 4px;position:relative;flex:1;min-height:62px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:.12s}
.mc-card .cm{font-size:11px;font-weight:700;line-height:1.2;text-align:center}
.mc-card .gp{font-size:9px;padding:1px 5px;border-radius:5px;line-height:1.4;font-weight:600;display:inline-block}
.mc-card.draggable{cursor:grab;user-select:none;-webkit-user-select:none}
.mc-card.drag-src{opacity:.25!important}
.mc-open{background:#0d1f3c}.mc-open .cm{color:#93c5fd}.mc-open .gp{background:#0d1f3c;color:#7db8f8;border:0.5px solid #2a4a7f}
.mc-deep{background:#2a1f00}.mc-deep .cm{color:#fcd34d}.mc-deep .gp{background:#2a1f00;color:#f5c030;border:0.5px solid #50380a}
.mc-recruit{background:#0a2018}.mc-recruit .cm{color:#6ee7b7}.mc-recruit .gp{background:#0a2018;color:#50d4a0;border:0.5px solid #1a5038}
.mc-adult{background:#0a1f2e}.mc-adult .cm{color:#7dd3fc}.mc-adult .gp{background:#0a1f2e;color:#60c8f8;border:0.5px solid #1a4060}
.mc-rope{background:#051f1a}.mc-rope .cm{color:#5eead4}.mc-rope .gp{background:#051f1a;color:#40d4c0;border:0.5px solid #0f4040}
.mc-badminton{background:#221800}.mc-badminton .cm{color:#fde68a}.mc-badminton .gp{background:#221800;color:#fbd060;border:0.5px solid #50380a}
.mc-inline{background:#160d30}.mc-inline .cm{color:#d8b4fe}.mc-inline .gp{background:#160d30;color:#c0a0f8;border:0.5px solid #3a2070}
.mc-special{background:#280d1e}.mc-special .cm{color:#fbb6ce}.mc-special .gp{background:#280d1e;color:#f898c0;border:0.5px solid #601040}
.mc-new{background:transparent}.mc-new .cm{color:#6a7090;font-size:9px;font-weight:400}
.card-ed-btn{position:absolute;top:2px;right:2px;background:rgba(232,160,32,.88);color:#1a1100;border:none;border-radius:3px;padding:1px 4px;font-size:9px;font-weight:700;cursor:pointer;display:none;line-height:1.3}
.cell-inner:hover .card-ed-btn{display:block}
.cell-add-btn{width:100%;padding:4px 0;background:#1e2130;border:1px dashed #3a3f55;border-radius:4px;color:#6a7090;font-size:12px;cursor:pointer;text-align:center;font-weight:700;transition:.12s;flex-shrink:0;line-height:1}
.cell-add-btn:hover{background:#252838;border-color:#e8a020;color:#e8a020}
.empty-add{width:100%;height:100%;min-height:68px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#3a3f55;border:1px dashed #2e3147;border-radius:4px;cursor:pointer;font-weight:700;transition:.12s}
.empty-add:hover{border-color:#e8a020;color:#e8a020;background:#1e2130}
.cell-divider{height:1px;background:#2a2d3e;margin:0 2px;flex-shrink:0}
#drag-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.88;transform:scale(1.08);border-radius:5px;min-width:80px;padding:5px 8px;display:flex;flex-direction:column;align-items:center;gap:2px}
.ebar{background:#2a1f00;color:#fcd34d;font-size:12px;padding:8px 13px;border-radius:8px;margin-bottom:8px;display:none;align-items:center;gap:6px;font-weight:600;border:0.5px solid #50380a;flex-wrap:wrap}
.ebar.on{display:flex}
.ebar-tip{font-size:10px;opacity:.8;font-weight:400}
.btn-e{background:#1e2130;border:1px solid #3a3f55;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;color:#fff;font-weight:600}
.btn-e.on{background:#e8a020;color:#1a1100;border-color:#e8a020}
.wg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.wsh{font-size:12px;font-weight:700;text-align:center;padding:7px;background:#1e2130;color:#e8a020;border-radius:8px;margin-bottom:5px;border:0.5px solid #2e3147}
@media(max-width:460px){.wg{grid-template-columns:1fr}}
.note{font-size:12px;color:#8a90a8;margin-top:8px;padding:0 2px}
.memo-section{margin-top:16px;background:#1a1d27;border:0.5px solid #3a3f55;border-radius:10px;padding:14px}
.memo-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.memo-hd-left{display:flex;align-items:center;gap:8px}
.memo-hd-title{font-size:14px;font-weight:700;color:#fff}
.memo-lock{font-size:11px;color:#6a7090;font-weight:500}
.memo-saved{font-size:11px;color:#4ade80;font-weight:500;opacity:0;transition:opacity .4s}
.memo-saved.show{opacity:1}
.memo-ta{width:100%;min-height:90px;background:#0f1117;border:0.5px solid #2e3147;border-radius:8px;color:#f0f2f8;font-size:13px;font-family:inherit;padding:10px 12px;resize:vertical;line-height:1.7;transition:opacity .2s}
.memo-ta:focus{outline:none;border-color:#e8a020}
.memo-ta::placeholder{color:#4a5068}
.memo-ta:read-only{opacity:.4;cursor:not-allowed}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}
@media(min-height:700px){.ov{align-items:center;padding:12px}}
.md{background:#1a1d27;border-radius:16px 16px 0 0;border:0.5px solid #2e3147;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
@media(min-height:700px){.md{border-radius:12px;max-height:88vh}}
.md-hd{background:#0d1120;padding:14px 16px;border-radius:16px 16px 0 0;border-bottom:0.5px solid #2e3147;position:sticky;top:0;z-index:1}
@media(min-height:700px){.md-hd{border-radius:12px 12px 0 0}}
.md-hd-lbl{font-size:11px;color:#8a90a8;margin-bottom:3px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.md-hd-slot{font-size:16px;font-weight:700;color:#fff;line-height:1.3}
.md-body{padding:14px 16px}
.sec-title{font-size:11px;font-weight:700;color:#d0d4e8;margin-bottom:8px;letter-spacing:.4px;text-transform:uppercase}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:14px}
.tp-btn{padding:8px 4px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:.12s;text-align:center;line-height:1.3}
.tp-btn:active{transform:scale(.95)}
.tp-open{background:#0d1f3c;color:#93c5fd}.tp-deep{background:#2a1f00;color:#fcd34d}
.tp-recruit{background:#0a2018;color:#6ee7b7}.tp-adult{background:#0a1f2e;color:#7dd3fc}
.tp-rope{background:#051f1a;color:#5eead4}.tp-badminton{background:#221800;color:#fde68a}
.tp-inline{background:#160d30;color:#d8b4fe}.tp-special{background:#280d1e;color:#fbb6ce}
.tp-new{background:#1e2130;color:#8a90a8}
.tp-btn.sel{border-color:currentColor}
.inp-wrap{margin-bottom:10px}
.inp-label{font-size:12px;font-weight:700;color:#e0e2f0;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.inp-hint{font-size:10px;color:#6a7090;font-weight:500}
.inp-field{width:100%;padding:10px 12px;border:0.5px solid #3a3f55;border-radius:8px;font-size:14px;background:#0f1117;color:#f0f2f8;font-family:inherit}
.inp-field:focus{outline:none;border-color:#e8a020;box-shadow:0 0 0 3px rgba(232,160,32,.14)}
.inp-field::placeholder{color:#4a5068}
.cap-section{background:#0f1117;border-radius:8px;padding:10px 12px;margin-bottom:10px;border:0.5px solid #2e3147}
.cap-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.cap-col{text-align:center}
.cap-col-lbl{font-size:11px;font-weight:700;color:#d0d4e8;margin-bottom:6px;display:block}
.num-ctrl{display:flex;align-items:center;gap:4px;justify-content:center}
.num-btn{width:30px;height:30px;border:0.5px solid #3a3f55;border-radius:6px;background:#1e2130;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:300;flex-shrink:0;user-select:none;transition:.1s;-webkit-tap-highlight-color:transparent}
.num-btn:hover{background:#2e3147;color:#e8a020}
.num-btn:active{transform:scale(.9);background:#e8a020;color:#1a1100}
.num-display{min-width:36px;text-align:center;font-size:18px;font-weight:700;color:#fff;background:#0f1117;border:0.5px solid #3a3f55;border-radius:6px;padding:4px 2px;line-height:1.4}
.prev-wrap{margin-bottom:12px}
.prev-lbl{font-size:11px;font-weight:700;color:#d0d4e8;margin-bottom:5px}
.prev-box{border:0.5px solid #2e3147;border-radius:8px;padding:10px;min-height:54px;display:flex;align-items:center;justify-content:center;background:#0f1117}
.md-footer{display:flex;gap:8px;padding:10px 16px 16px;position:sticky;bottom:0;background:#1a1d27;border-top:0.5px solid #2e3147}
.btn-save{flex:2;padding:13px;background:#e8a020;color:#1a1100;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-save:hover{background:#f0b030}
.btn-cancel{flex:1;padding:13px;background:#1e2130;color:#fff;border:0.5px solid #3a3f55;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
.btn-del{padding:13px;background:#3a0d0d;color:#f87171;border:0.5px solid #7f1d1d;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-del:hover{background:#4a1010}
.tk-item{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.tk-del{width:36px;height:40px;background:#3a0d0d;border:0.5px solid #7f1d1d;border-radius:7px;color:#f87171;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.tk-del:hover{background:#4a1010}
.tk-add{width:100%;padding:11px;background:#0a2018;border:0.5px solid #166534;border-radius:8px;color:#6ee7b7;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.tk-add:hover{background:#112a20}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#e8a020;color:#1a1100;padding:10px 24px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;font-weight:700}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="w">
<div class="hd"><div class="logo">DO <em>SPORTS</em> 시간표</div><button class="btn-e" id="edbtn" onclick="toggleEdit()">✎ 편집</button></div>
<div class="ticker-wrap">
  <span class="ticker-label">📢 공지</span>
  <div class="ticker-vp"><div class="ticker-track" id="ticker-track">로딩 중...</div></div>
  <button class="ticker-edit" id="tk-btn" onclick="openTickerModal()">+ 공지 편집</button>
</div>
<div class="ebar" id="ebar">✎ 편집 모드 <span class="ebar-tip">| 카드 길게 누르면 이동 | 시간 길게 누르면 순서 변경</span></div>
<div class="stabs">
  <button class="stab on" onclick="ss('bb',this)">🏀 농구교실</button>
  <button class="stab" onclick="ss('sc',this)">⚽ 축구교실</button>
  <button class="stab" onclick="ss('kd',this)">🧒 키즈스포츠</button>
</div>
<div id="mc"></div>
<div class="memo-section">
  <div class="memo-hd">
    <div class="memo-hd-left"><span class="memo-hd-title">📝 메모</span><span class="memo-lock" id="memo-lock">🔒 편집 모드에서 수정 가능</span></div>
    <span class="memo-saved" id="memo-saved">저장됨 ✓</span>
  </div>
  <textarea class="memo-ta" id="memo-ta" readonly placeholder="편집 모드에서 메모를 입력할 수 있습니다"></textarea>
</div>
</div>
<div id="drag-ghost" style="display:none"></div>
<div class="ov" id="cm-ov" style="display:none">
<div class="md">
  <div class="md-hd"><div class="md-hd-lbl" id="m-lbl">수업 수정</div><div class="md-hd-slot" id="m-slot">—</div></div>
  <div class="md-body">
    <div class="sec-title">수업 종류</div>
    <div class="type-grid">
      <button class="tp-btn tp-open" onclick="selType('open',this)">오픈반</button>
      <button class="tp-btn tp-deep" onclick="selType('deep',this)">심화/담반</button>
      <button class="tp-btn tp-recruit" onclick="selType('recruit',this)">모집중</button>
      <button class="tp-btn tp-adult" onclick="selType('adult',this)">성인반</button>
      <button class="tp-btn tp-rope" onclick="selType('rope',this)">줄넘기</button>
      <button class="tp-btn tp-badminton" onclick="selType('badminton',this)">배드민턴</button>
      <button class="tp-btn tp-inline" onclick="selType('inline',this)">인라인</button>
      <button class="tp-btn tp-special" onclick="selType('special',this)">특별반</button>
      <button class="tp-btn tp-new" onclick="selType('new',this)">신규개설</button>
    </div>
    <div class="inp-wrap"><label class="inp-label">수업명 <span class="inp-hint">직접 입력</span></label><input class="inp-field" id="f-nm" placeholder="예: 오픈반 · 심화반 A조" oninput="updatePrev()"/></div>
    <div class="inp-wrap"><label class="inp-label">학년 / 대상 <span class="inp-hint">직접 입력</span></label><input class="inp-field" id="f-sb" placeholder="예: 초5-6학년 · 유치 7세" oninput="updatePrev()"/></div>
    <div class="cap-section">
      <div class="sec-title" style="margin-bottom:8px">정원 관리</div>
      <div class="cap-cols">
        <div class="cap-col"><span class="cap-col-lbl">정원</span><div class="num-ctrl"><button class="num-btn" onclick="adj('mx',-1)">−</button><span class="num-display" id="d-mx">0</span><button class="num-btn" onclick="adj('mx',1)">+</button></div></div>
        <div class="cap-col"><span class="cap-col-lbl">등록</span><div class="num-ctrl"><button class="num-btn" onclick="adj('en',-1)">−</button><span class="num-display" id="d-en">0</span><button class="num-btn" onclick="adj('en',1)">+</button></div></div>
        <div class="cap-col"><span class="cap-col-lbl">대기</span><div class="num-ctrl"><button class="num-btn" onclick="adj('wl',-1)">−</button><span class="num-display" id="d-wl">0</span><button class="num-btn" onclick="adj('wl',1)">+</button></div></div>
      </div>
    </div>
    <div class="prev-wrap"><div class="prev-lbl">미리보기</div><div class="prev-box" id="prev-box"></div></div>
  </div>
  <div class="md-footer"><button class="btn-save" onclick="saveCell()">저장</button><button class="btn-del" id="btn-del" onclick="deleteClass()" style="display:none">삭제</button><button class="btn-cancel" onclick="closeOv('cm-ov')">취소</button></div>
</div>
</div>
<div class="ov" id="te-ov" style="display:none">
<div class="md" style="max-width:360px">
  <div class="md-hd"><div class="md-hd-lbl">시간 수정</div><div class="md-hd-slot" id="te-slot">—</div></div>
  <div class="md-body"><div class="inp-wrap"><label class="inp-label">시간 <span class="inp-hint">예: 14:00-15:00</span></label><input class="inp-field" id="te-val" placeholder="14:00-15:00" onkeydown="if(event.key==='Enter')saveTime()"/></div></div>
  <div class="md-footer"><button class="btn-save" onclick="saveTime()">저장</button><button class="btn-cancel" onclick="closeOv('te-ov')">취소</button></div>
</div>
</div>
<div class="ov" id="tk-ov" style="display:none">
<div class="md">
  <div class="md-hd"><div class="md-hd-lbl">공지 관리</div><div class="md-hd-slot">스크롤 공지 편집</div></div>
  <div class="md-body"><div class="sec-title" style="margin-bottom:10px">공지 목록</div><div id="tk-list"></div><button class="tk-add" onclick="addTickerMsg()">+ 공지 추가</button></div>
  <div class="md-footer"><button class="btn-save" onclick="saveTickerAll()">저장</button><button class="btn-cancel" onclick="closeOv('tk-ov')">취소</button></div>
</div>
</div>
<div class="ov" id="pw-ov" style="display:none">
<div class="md" style="max-width:360px">
  <div class="md-hd"><div class="md-hd-lbl">편집 잠금 해제</div><div class="md-hd-slot">비밀번호 입력</div></div>
  <div class="md-body"><div class="inp-wrap"><input type="password" id="pw-in" class="inp-field" placeholder="비밀번호" onkeydown="if(event.key==='Enter')chkPwd()"/></div><div id="pw-err" style="font-size:12px;color:#f87171;min-height:16px;margin-top:-4px"></div></div>
  <div class="md-footer"><button class="btn-save" onclick="chkPwd()">확인</button><button class="btn-cancel" onclick="closeOv('pw-ov')">취소</button></div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
const PWD='1234';

function migrate(c){if(!c)return[];if(Array.isArray(c))return c;if(c.type==='empty')return[];return[c];}
function migrateAll(d){['bb','sc','kd'].forEach(sp=>{d[sp].wdGrid=d[sp].wdGrid.map(r=>r.map(migrate));d[sp].sat.cells=d[sp].sat.cells.map(migrate);d[sp].sun.cells=(d[sp].sun.cells||[]).map(migrate);});return d;}

// ★ 버그 수정된 padCells: 저장된 times가 있으면 절대 덮어쓰지 않음
function padCells(d,sp,sec,times){
  if(!d[sp][sec].times||d[sp][sec].times.length===0){
    d[sp][sec].times=[...times];
  }
  const c=d[sp][sec].cells;
  while(c.length<d[sp][sec].times.length)c.push([]);
}

function loadData(){
  try{
    const s=localStorage.getItem(SK);
    if(s){
      const d=migrateAll(JSON.parse(s));
      // ★ 버그 수정: 저장된 times 보존, 없을 때만 기본값 사용
      ['sc','kd'].forEach(sp=>{
        padCells(d,sp,'sat',SAT_TIMES);
        padCells(d,sp,'sun',SUN_TIMES);
      });
      if(!d.ticker||!d.ticker.length)d.ticker=[...DEF_TICKER];
      if(!d.memo)d.memo={bb:'',sc:'',kd:''};
      return d;
    }
  }catch(e){}
  return defData();
}
function saveData(){try{localStorage.setItem(SK,JSON.stringify(DATA));}catch(e){}}
function getCA(sp,sec,i1,i2){if(sec==='wd')return DATA[sp].wdGrid[i1][i2];if(sec==='sat')return DATA[sp].sat.cells[i1];return DATA[sp].sun.cells[i1];}
function setCA(sp,sec,i1,i2,a){if(sec==='wd')DATA[sp].wdGrid[i1][i2]=a;else if(sec==='sat')DATA[sp].sat.cells[i1]=a;else DATA[sp].sun.cells[i1]=a;}
function adj(k,d){CV[k]=Math.max(0,Math.min(99,CV[k]+d));document.getElementById('d-'+k).textContent=CV[k];}
function setCV(mx,en,wl){CV={mx,en,wl};['mx','en','wl'].forEach(k=>document.getElementById('d-'+k).textContent=CV[k]);}
function capH(c){if(!c||!c.max||c.max===0)return'';const en=c.enrolled||0,mx=c.max,wl=c.waitlist||0,rem=mx-en;const cls=en>=mx?'cp-full':rem<=2?'cp-mid':'cp-ok';return'<div class="cap-row"><span class="cp '+cls+'">'+en+'/'+mx+'명</span>'+(wl>0?'<span class="wl">대기 '+wl+'명</span>':'')+'</div>';}
function gpH(c){return c&&c.sub?'<span class="gp">'+c.sub+'</span>':'';}
function renderCell(arr,ed,sp,sec,ti,di){const p=[];const dt='data-dt="'+sp+'|'+sec+'|'+ti+'|'+di+'"';if(!arr.length){p.push(ed?'<div class="empty-add" onclick="openAddClass(\''+sp+'\',\''+sec+'\','+ti+','+di+')">＋</div>':'');}else{arr.forEach((c,ci)=>{if(ci>0)p.push('<div class="cell-divider"></div>');const dc=ed?'data-dc="'+sp+'|'+sec+'|'+ti+'|'+di+'|'+ci+'"':'';const eb=ed?'<button class="card-ed-btn" onclick="event.stopPropagation();openEditClass(\''+sp+'\',\''+sec+'\','+ti+','+di+','+ci+')">✎ 수정</button>':'';p.push('<div class="mc-card mc-'+c.type+(ed?' draggable':'')+'" '+dc+'>'+eb+'<div class="cm">'+(c.text||'')+'</div>'+gpH(c)+capH(c)+'</div>');});if(ed)p.push('<button class="cell-add-btn" onclick="openAddClass(\''+sp+'\',\''+sec+'\','+ti+','+di+')">＋ 추가</button>');}return'<td class="cell" '+dt+'><div class="cell-inner">'+p.join('')+'</div></td>';}
function tcTd(sp,sec,idx,t){if(EM){const dr='data-dr="'+sp+'|'+sec+'|'+idx+'"';return'<td class="tc te dr-row" '+dr+' onclick="openTE(\''+sp+'\',\''+sec+'\','+idx+')">'+t.replace('-','<br>')+'<span class="te-ic">✎</span></td>';}return'<td class="tc">'+t.replace('-','<br>')+'</td>';}
function renderWE(sp,sec,label){const d=DATA[sp];const times=d[sec].times||[];const cells=d[sec].cells||[];if(!times.length)return'<div><div class="wsh">'+label+'</div><p style="font-size:12px;color:#6a7090;text-align:center;padding:14px 0">수업 없음</p></div>';const hasAny=cells.some(a=>a&&a.length>0);if(!EM&&!hasAny)return'<div><div class="wsh">'+label+'</div><p style="font-size:12px;color:#6a7090;text-align:center;padding:14px 0">수업 없음</p></div>';let rows='';times.forEach((t,i)=>{const arr=cells[i]||[];if(!EM&&!arr.length)return;rows+='<tr>'+tcTd(sp,sec,i,t)+renderCell(arr,EM,sp,sec,i,0)+'</tr>';});if(!rows)rows='<tr><td colspan="2" style="font-size:12px;color:#6a7090;text-align:center;padding:14px">수업 없음</td></tr>';return'<div><div class="wsh">'+label+'</div><div class="ow"><table><thead><tr><th>시간</th><th>수업</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';}
function render(){const d=DATA[CS];const wc=(d.sat.cells||[]).filter(a=>a&&a.length>0).length+(d.sun.cells||[]).filter(a=>a&&a.length>0).length;let h='<div class="sec-hd"><span>📅 평일 수업 (월~금)</span></div><div class="ow"><table><thead><tr><th>시간</th>'+d.wdDays.map(x=>'<th>'+x+'</th>').join('')+'</tr></thead><tbody>';d.wdTimes.forEach((t,ti)=>{h+='<tr>'+tcTd(CS,'wd',ti,t);d.wdGrid[ti].forEach((arr,di)=>{h+=renderCell(arr,EM,CS,'wd',ti,di);});h+='</tr>';});h+='</tbody></table></div>';if(d.note)h+='<p class="note">※ '+d.note+'</p>';h+='<div class="sec-hd" style="margin-top:16px"><span>🗓️ 주말 수업 (토·일)</span><span class="wknd-cnt">'+wc+'개 운영중</span></div><div class="wg">'+renderWE(CS,'sat','토요일')+renderWE(CS,'sun','일요일')+'</div>';document.getElementById('mc').innerHTML=h;}
function openAddClass(sp,sec,ti,di){if(!EM)return;ET={sp,sec,ti,di,ci:null};document.getElementById('m-lbl').textContent='수업 추가';document.getElementById('m-slot').textContent=_sl(sp,sec,ti);document.getElementById('btn-del').style.display='none';CT='open';document.querySelectorAll('.tp-btn').forEach(b=>b.classList.remove('sel'));document.querySelector('.tp-open').classList.add('sel');document.getElementById('f-nm').value='오픈반';document.getElementById('f-sb').value='';setCV(8,0,0);updatePrev();document.getElementById('cm-ov').style.display='flex';}
function openEditClass(sp,sec,ti,di,ci){if(!EM)return;ET={sp,sec,ti,di,ci};const c=getCA(sp,sec,ti,di)[ci];document.getElementById('m-lbl').textContent='수업 수정 ('+(ci+1)+'번째)';document.getElementById('m-slot').textContent=_sl(sp,sec,ti);document.getElementById('btn-del').style.display='';CT=c.type||'open';document.querySelectorAll('.tp-btn').forEach(b=>b.classList.remove('sel'));const s=document.querySelector('.tp-'+CT);if(s)s.classList.add('sel');document.getElementById('f-nm').value=c.text||'';document.getElementById('f-sb').value=c.sub||'';setCV(c.max||0,c.enrolled||0,c.waitlist||0);updatePrev();document.getElementById('cm-ov').style.display='flex';}
function _sl(sp,sec,ti){if(sec==='wd')return DATA[sp].wdDays[0]+'~금 · '+DATA[sp].wdTimes[ti];if(sec==='sat')return'토요일 · '+(DATA[sp].sat.times[ti]||'');return'일요일 · '+(DATA[sp].sun.times[ti]||'');}
function saveCell(){if(!ET)return;const{sp,sec,ti,di,ci}=ET;const nm=document.getElementById('f-nm').value.trim(),sb=document.getElementById('f-sb').value.trim();const nc={type:CT,text:nm||CT,sub:sb,max:CV.mx,enrolled:CV.en,waitlist:CV.wl};const arr=getCA(sp,sec,ti,di);if(ci===null)arr.push(nc);else arr[ci]=nc;setCA(sp,sec,ti,di,arr);saveData();closeOv('cm-ov');render();showToast(ci===null?'수업 추가 완료 ✓':'수업 수정 완료 ✓');}
function deleteClass(){if(!ET||ET.ci===null)return;const{sp,sec,ti,di,ci}=ET;const arr=getCA(sp,sec,ti,di);arr.splice(ci,1);setCA(sp,sec,ti,di,arr);saveData();closeOv('cm-ov');render();showToast('수업 삭제 완료');}
function selType(tp,btn){CT=tp;document.querySelectorAll('.tp-btn').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');const nm=document.getElementById('f-nm');const defs={open:'오픈반',deep:'심화반',recruit:'모집중',adult:'성인반',rope:'줄넘기',badminton:'배드민턴',inline:'인라인',special:'특별반',new:'신규개설가능'};if(!nm.value.trim()||Object.values(defs).includes(nm.value))nm.value=defs[tp]||'';updatePrev();}
function updatePrev(){const tp=CT,nm=document.getElementById('f-nm').value,sb=document.getElementById('f-sb').value;const{mx,en,wl}=CV;const gp=sb?'<span class="gp" style="background:'+(TBGS[tp]||'#1a1d27')+';color:'+(TFGS[tp]||'#aaa')+';border:0.5px solid '+(TFGS[tp]||'#aaa')+'50">'+sb+'</span>':'';let cap='';if(mx>0){const rem=mx-en;const cls=en>=mx?'cp-full':rem<=2?'cp-mid':'cp-ok';cap='<div class="cap-row"><span class="cp '+cls+'">'+en+'/'+mx+'명</span>'+(wl>0?'<span class="wl">대기 '+wl+'명</span>':'')+'</div>';}document.getElementById('prev-box').innerHTML='<div style="background:'+(TBGS[tp]||'#1a1d27')+';border-radius:6px;padding:10px 20px;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:110px"><div style="font-size:13px;font-weight:700;color:'+(TFGS[tp]||'#fff')+'">'+nm+'</div>'+gp+cap+'</div>';}
function renderTicker(){const msgs=DATA.ticker&&DATA.ticker.length?DATA.ticker:DEF_TICKER;const text=msgs.map(m=>'🔔 '+m).join('　　　✦　　　');const full=text+'　　　　'+text;const track=document.getElementById('ticker-track');if(!track)return;track.textContent=full;track.style.animationDuration=Math.max(12,full.length*0.18)+'s';}
function openTickerModal(){renderTickerList();document.getElementById('tk-ov').style.display='flex';}
function renderTickerList(){let h='';(DATA.ticker||[]).forEach((msg,i)=>{h+='<div class="tk-item"><input class="inp-field" id="tk-'+i+'" value="'+msg.replace(/"/g,'&quot;')+'" style="flex:1;padding:10px 12px;font-size:13px"/><button class="tk-del" onclick="delTk('+i+')">×</button></div>';});document.getElementById('tk-list').innerHTML=h||'<p style="font-size:12px;color:#6a7090;margin-bottom:10px">등록된 공지가 없습니다</p>';}
function addTickerMsg(){if(!DATA.ticker)DATA.ticker=[];syncTk();DATA.ticker.push('새 공지사항');renderTickerList();const l=document.getElementById('tk-'+(DATA.ticker.length-1));if(l){l.focus();l.select();}}
function delTk(i){syncTk();DATA.ticker.splice(i,1);renderTickerList();}
function syncTk(){(DATA.ticker||[]).forEach((_,i)=>{const el=document.getElementById('tk-'+i);if(el)DATA.ticker[i]=el.value;});}
function saveTickerAll(){syncTk();saveData();closeOv('tk-ov');renderTicker();showToast('공지 저장 완료 ✓');}
function openTE(sp,sec,idx){if(!EM||DRAG)return;TE_={sp,sec,idx};const cur=sec==='wd'?DATA[sp].wdTimes[idx]:(sec==='sat'?DATA[sp].sat.times[idx]:DATA[sp].sun.times[idx]);const lb={wd:'평일',sat:'토요일',sun:'일요일'};document.getElementById('te-slot').textContent=lb[sec]+' '+(idx+1)+'번째 슬롯';document.getElementById('te-val').value=cur||'';document.getElementById('te-ov').style.display='flex';setTimeout(()=>{const el=document.getElementById('te-val');el.focus();el.select();},60);}
function saveTime(){if(!TE_)return;const{sp,sec,idx}=TE_;const val=document.getElementById('te-val').value.trim();if(!val)return;if(sec==='wd')DATA[sp].wdTimes[idx]=val;else if(sec==='sat')DATA[sp].sat.times[idx]=val;else DATA[sp].sun.times[idx]=val;saveData();closeOv('te-ov');render();showToast('시간 저장 완료 ✓');}
function setMemoMode(on){const ta=document.getElementById('memo-ta'),lk=document.getElementById('memo-lock');ta.readOnly=!on;if(on){ta.placeholder='메모를 입력하세요...';lk.textContent='✏️ 편집 가능';lk.style.color='#4ade80';}else{ta.placeholder='편집 모드에서 메모를 입력할 수 있습니다';lk.textContent='🔒 편집 모드에서 수정 가능';lk.style.color='#6a7090';}}
function initMemo(){const ta=document.getElementById('memo-ta');ta.value=DATA.memo[CS]||'';setMemoMode(EM);ta.oninput=()=>{if(ta.readOnly)return;DATA.memo[CS]=ta.value;clearTimeout(memoTimer);memoTimer=setTimeout(()=>{saveData();const sv=document.getElementById('memo-saved');sv.classList.add('show');setTimeout(()=>sv.classList.remove('show'),2000);},600);};}
function updateMemo(){document.getElementById('memo-ta').value=DATA.memo[CS]||'';}
function ss(s,btn){CS=s;document.querySelectorAll('.stab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render();updateMemo();}
function toggleEdit(){if(EM){EM=false;document.getElementById('edbtn').classList.remove('on');document.getElementById('edbtn').textContent='✎ 편집';document.getElementById('ebar').classList.remove('on');document.getElementById('tk-btn').classList.remove('on');setMemoMode(false);render();showToast('편집 모드 종료');}else{document.getElementById('pw-ov').style.display='flex';setTimeout(()=>document.getElementById('pw-in').focus(),50);}}
function chkPwd(){if(document.getElementById('pw-in').value===PWD){closeOv('pw-ov');document.getElementById('pw-in').value='';document.getElementById('pw-err').textContent='';EM=true;document.getElementById('edbtn').classList.add('on');document.getElementById('edbtn').textContent='✓ 완료';document.getElementById('ebar').classList.add('on');document.getElementById('tk-btn').classList.add('on');setMemoMode(true);render();showToast('편집 모드 활성화');}else{document.getElementById('pw-err').textContent='비밀번호가 틀렸습니다.';}}
function closeOv(id){document.getElementById(id).style.display='none';}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
DATA=loadData();render();renderTicker();initMemo();
</script>
</body>
</html>
